spring.application.name=backend

# ── MySQL connection ─────────────────────────────────────────
# Change password to match your MySQL Workbench password
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Patel@3454
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA settings ─────────────────────────────────────────────
# 'none' = Spring Boot does NOT create/alter tables (we use setup_database.sql)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server ───────────────────────────────────────────────────
server.port=8080

# ── CORS (belt + suspenders) ──────────────────────────────────
spring.mvc.cors.allowed-origins=*
